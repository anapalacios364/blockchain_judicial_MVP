name: judicial-mvp-ci

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install black==24.8.0 flake8==7.1.1
      - name: Black check
        run: black --check custom_addons scripts
      - name: Flake8
        run: flake8 custom_addons scripts --max-line-length=100

  hardhat-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/hardhat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Run tests
        run: npx hardhat test
