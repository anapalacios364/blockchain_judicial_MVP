upstream odoo {
    server odoo:8069;
}

server {
    listen 80;
    server_name _;

    # Timeouts extendidos para operaciones largas (reportes, uploads)
    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    # Tamaño máximo de archivos subidos (ajusta según tus evidencias judiciales)
    client_max_body_size  200m;

    # Headers obligatorios para que Odoo con proxy_mode = True funcione bien
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Ruta principal → Odoo
    location / {
        proxy_pass http://odoo;
    }

    # Longpolling de Odoo (necesario para notificaciones en tiempo real)
    # Si workers = 0, esto no aplica, pero lo dejamos listo para cloud
    location /longpolling {
        proxy_pass http://odoo;
    }

    # Archivos estáticos — sirve directamente desde Nginx para mejor rendimiento
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering   on;
        proxy_pass        http://odoo;
    }

    # Bloquear acceso directo a archivos sensibles
    location ~* \.(py|pyc|cfg|conf)$ {
        deny all;
    }

    # Gzip para reducir transferencia de datos
    gzip            on;
    gzip_min_length 1100;
    gzip_buffers    4 32k;
    gzip_types      text/plain text/xml text/css text/less
                    application/json application/javascript application/x-javascript;
    gzip_vary       on;
}
