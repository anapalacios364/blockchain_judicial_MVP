services:
  db:
    image: postgres:16
    container_name: judicial_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - judicial_db_data:/var/lib/postgresql/data
    networks:
      - judicial_net
    # Healthcheck: Odoo esperará a que Postgres esté listo antes de arrancar
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  odoo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: judicial_odoo
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      HOST: ${ODOO_DB_HOST:-db}
      PORT: ${ODOO_DB_PORT:-5432}
      USER: ${ODOO_DB_USER:-}
      PASSWORD: ${ODOO_DB_PASSWORD:-}

      JUDICIAL_EVM_RPC_URL: ${JUDICIAL_EVM_RPC_URL:-}
      JUDICIAL_CHAIN_ID: ${JUDICIAL_CHAIN_ID:-}
      JUDICIAL_PRIVATE_KEY: ${JUDICIAL_PRIVATE_KEY:-}
      JUDICIAL_CONTRACT_ADDRESS: ${JUDICIAL_CONTRACT_ADDRESS:-}
      JUDICIAL_CONTRACT_ABI: ${JUDICIAL_CONTRACT_ABI:-}

      JUDICIAL_POLYGON_RPC_URL: ${JUDICIAL_EVM_RPC_URL:-}
    volumes:
      # Filestore de Odoo
      - judicial_odoo_data:/var/lib/odoo
      # Módulos custom
      - ../custom_addons:/mnt/extra-addons
      # Configuración de Odoo
      - ./odoo.conf:/etc/odoo/odoo.conf
      - "C:/Backup_feb_2026/PycharmProjects/Odoo/odoo19comm/odoo/addons:/mnt/odoo19comm-addons:ro"
      - "C:/Backup_feb_2026/PycharmProjects/Odoo/odoo19comm/odoo/addons:/mnt/odoo19comm-addons-addons:ro"
      - "C:/Backup_feb_2026/PycharmProjects/Odoo/odoo19ent:/mnt/odoo19ent-enterprise:ro"
    expose:
      - "8069"
    networks:
      - judicial_net

  nginx:
    image: nginx:1.27-alpine
    container_name: judicial_nginx
    depends_on:
      - odoo
    ports:
      # Puerto 8069 en el host → puerto 80 en Nginx
      # Para cloud, cambia a "80:80" y "443:443" con TLS
      - "8069:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - judicial_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: judicial_prometheus
    depends_on:
      - odoo
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - judicial_net
    restart: unless-stopped

volumes:
  judicial_db_data:
  judicial_odoo_data:

networks:
  judicial_net:
    driver: bridge
